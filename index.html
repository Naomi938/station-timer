<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יום תחנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --accent-dim: #00e5a022;
    --warn: #ffb700;
    --danger: #ff4466;
    --text: #e8e8f0;
    --muted: #555570;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    width: 100%;
    max-width: 540px;
    position: relative;
    z-index: 1;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .title { font-size: 18px; font-weight: 700; }
  .round-badge {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .phase-label {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    min-height: 56px;
    line-height: 1.4;
    margin-bottom: 20px;
  }
  .timer-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(72px, 20vw, 108px);
    line-height: 1;
    text-align: center;
    color: var(--accent);
    transition: color 0.3s;
    letter-spacing: -3px;
    margin-bottom: 16px;
  }
  .timer-display.warn   { color: var(--warn); }
  .timer-display.danger { color: var(--danger); }
  .timer-display.idle   { color: var(--muted); }
  .progress-track {
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.5s linear, background 0.3s;
    width: 0%;
  }
  .progress-fill.warn   { background: var(--warn); }
  .progress-fill.danger { background: var(--danger); }
  .steps-wrap { margin-bottom: 24px; }
  .steps-title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .steps-list { display: flex; flex-direction: column; gap: 4px; }
  .step-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.3s;
  }
  .step-item.done { color: var(--muted); text-decoration: line-through; }
  .step-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 700; }
  .step-item.upcoming { color: var(--text); }
  .step-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 8px;
    border: none;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start { background: var(--accent); color: #0a0a0f; }
  .btn-start:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-reset { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-reset:hover { border-color: var(--danger); color: var(--danger); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .mode-toggle { display: flex; gap: 8px; margin-bottom: 24px; }
  .mode-btn {
    flex: 1; padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .admin-section { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .overlay-text {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    color: var(--accent);
    text-align: center;
    padding: 32px;
    max-width: 600px;
    line-height: 1.4;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .status-dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .conn-status { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 16px; }
  .conn-status.connected { color: var(--accent); }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="overlay-text" id="overlayText"></div>
</div>

<div class="card">
  <div class="header">
    <span class="title">יום תחנות</span>
    <div style="display:flex;gap:10px;align-items:center;">
      <span class="round-badge" id="roundBadge" style="display:none">סבב 1 / 6</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btnViewer" onclick="setMode('viewer')">צפייה</button>
    <button class="mode-btn" id="btnAdmin" onclick="setMode('admin')">ניהול</button>
  </div>

  <div class="conn-status" id="connStatus">מתחבר...</div>

  <div class="phase-label" id="phaseLabel">ממתין להתחלה</div>
  <div class="timer-display idle" id="timerDisplay">--:--</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div class="steps-wrap" id="stepsWrap"></div>

  <div class="admin-section" id="adminSection" style="display:none">
    <div class="btn-row">
      <button class="btn btn-start" id="btnStart" onclick="adminStart()">▶ התחל יום תחנות</button>
      <button class="btn btn-reset" onclick="adminReset()">↺ איפוס</button>
    </div>
  </div>
</div>

<script>
// =============================================
const SUPABASE_URL = 'https://kdmreoiusoowugsrbvzf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkbXJlb2l1c29vd3Vnc3JidnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDE3NDcsImV4cCI6MjA5NTg3Nzc0N30.F-B3Jb0l8Owq-LxMThJRthBTQG1W5Th9KDjRYjDhJ_c';
const ROW_ID = 1; // ה-id של השורה שיצרנו
// =============================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ANNOUNCE_DELAY = 4;

function buildSequence() {
  const seq = [];
  seq.push({ type: 'announce', text: 'התחלת יום תחנות', id: 'open' });
  seq.push({ type: 'timer',    text: 'קריאת הנחיות', duration: 150, id: 'instructions' });
  for (let r = 1; r <= 6; r++) {
    seq.push({ type: 'announce', text: 'כניסה לתחנה', id: `enter_${r}`, round: r });
    seq.push({ type: 'timer',    text: 'זמן בתחנה',   duration: 300, id: `t1_${r}`, round: r });
    seq.push({ type: 'announce', text: 'עברו 5 דקות', id: `mid_${r}`, round: r });
    seq.push({ type: 'timer',    text: 'זמן נוסף',    duration: 300, id: `t2_${r}`, round: r });
    seq.push({ type: 'announce', text: r < 6 ? 'יציאה מהתחנה ומעבר לתחנה הבאה' : 'יציאה מהתחנה האחרונה', id: `exit_${r}`, round: r });
  }
  seq.push({ type: 'announce', text: 'סוף יום תחנות', id: 'close', isFinal: true });
  return seq;
}

const SEQUENCE = buildSequence();

let mode = 'viewer';
let tickInterval = null;
let announceTimeout = null;
let lastStepId = null;

// --- Helpers ---
function fmt(sec) {
  if (sec < 0) sec = 0;
  return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'he-IL';
  u.rate = 0.92;
  window.speechSynthesis.speak(u);
}

function showOverlay(text, duration) {
  const el = document.getElementById('overlay');
  document.getElementById('overlayText').textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration * 1000 - 300);
}

// --- UI ---
function setMode(m) {
  mode = m;
  document.getElementById('btnViewer').classList.toggle('active', m==='viewer');
  document.getElementById('btnAdmin').classList.toggle('active', m==='admin');
  document.getElementById('adminSection').style.display = m==='admin' ? 'block' : 'none';
}

function renderSteps(currentIdx) {
  const start = Math.max(0, currentIdx - 1);
  const end   = Math.min(SEQUENCE.length - 1, currentIdx + 4);
  let html = '<div class="steps-title">התקדמות</div><div class="steps-list">';
  for (let i = start; i <= end; i++) {
    const s = SEQUENCE[i];
    const cls = i < currentIdx ? 'done' : i === currentIdx ? 'active' : 'upcoming';
    const dur = s.type === 'timer' ? ` (${fmt(s.duration)})` : '';
    html += `<div class="step-item ${cls}"><div class="step-dot"></div>${s.text}${dur}</div>`;
  }
  html += '</div>';
  document.getElementById('stepsWrap').innerHTML = html;
}

function updateTimerUI(remaining, total, step) {
  const disp = document.getElementById('timerDisplay');
  const fill = document.getElementById('progressFill');
  const dot  = document.getElementById('statusDot');

  document.getElementById('phaseLabel').textContent = step.text;

  if (step.type === 'announce') {
    disp.textContent = '--:--';
    disp.className = 'timer-display idle';
    fill.style.width = '0%';
    fill.className = 'progress-fill';
    dot.className = 'status-dot live';
    return;
  }

  disp.textContent = fmt(remaining);
  const pct = total > 0 ? Math.max(0, (remaining / total) * 100) : 0;
  fill.style.width = pct + '%';
  dot.className = 'status-dot live';

  let c = '';
  if (remaining <= 30) c = 'danger';
  else if (remaining <= total * 0.25) c = 'warn';
  disp.className = 'timer-display ' + c;
  fill.className = 'progress-fill ' + c;
}

function updateRoundBadge(round) {
  const b = document.getElementById('roundBadge');
  if (round) { b.textContent = `סבב ${round} / 6`; b.style.display = ''; }
  else b.style.display = 'none';
}

function setIdleUI() {
  document.getElementById('phaseLabel').textContent = 'ממתין להתחלה';
  document.getElementById('timerDisplay').textContent = '--:--';
  document.getElementById('timerDisplay').className = 'timer-display idle';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('roundBadge').style.display = 'none';
  document.getElementById('stepsWrap').innerHTML = '';
  clearInterval(tickInterval);
  clearTimeout(announceTimeout);
}

// --- Supabase ---
async function writeState(state) {
  await sb.from('timer_state').update({ state }).eq('id', ROW_ID);
}

async function readState() {
  const { data } = await sb.from('timer_state').select('state').eq('id', ROW_ID).single();
  return data?.state || null;
}

// --- Apply state ---
function applyState(state) {
  if (!state || !state.running) { setIdleUI(); lastStepId = null; return; }

  const idx = state.stepIndex;
  if (idx >= SEQUENCE.length) { setIdleUI(); return; }

  const step = SEQUENCE[idx];
  renderSteps(idx);
  updateRoundBadge(step.round || null);

  const isNewStep = state.stepId !== lastStepId;

  if (isNewStep) {
    lastStepId = state.stepId;
    clearInterval(tickInterval);
    clearTimeout(announceTimeout);

    if (step.type === 'announce') {
      speak(step.text);
      showOverlay(step.text, ANNOUNCE_DELAY);
      updateTimerUI(0, 0, step);

      if (mode === 'admin') {
        const elapsed = Date.now()/1000 - state.stepStart;
        const wait = Math.max(0, ANNOUNCE_DELAY - elapsed);
        announceTimeout = setTimeout(() => advanceStep(state), wait * 1000);
      }
    } else {
      // Start local tick
      tickInterval = setInterval(() => {
        const elapsed = Date.now()/1000 - state.stepStart;
        const remaining = Math.max(0, Math.round(step.duration - elapsed));
        updateTimerUI(remaining, step.duration, step);
        if (remaining <= 0) {
          clearInterval(tickInterval);
          if (mode === 'admin') advanceStep(state);
        }
      }, 300);
    }
  }
}

async function advanceStep(state) {
  clearTimeout(announceTimeout);
  clearInterval(tickInterval);
  const nextIdx = state.stepIndex + 1;
  if (nextIdx >= SEQUENCE.length) {
    await writeState({ running: false });
    setIdleUI();
    return;
  }
  const nextStep = SEQUENCE[nextIdx];
  const newState = {
    running: true,
    stepIndex: nextIdx,
    stepId: nextStep.id,
    stepStart: Date.now()/1000
  };
  await writeState(newState);
  applyState(newState);
}

// --- Admin ---
async function adminStart() {
  const firstStep = SEQUENCE[0];
  const state = {
    running: true,
    stepIndex: 0,
    stepId: firstStep.id,
    stepStart: Date.now()/1000
  };
  await writeState(state);
  applyState(state);
  document.getElementById('btnStart').textContent = '⏳ רץ...';
  document.getElementById('btnStart').disabled = true;
}

async function adminReset() {
  clearInterval(tickInterval);
  clearTimeout(announceTimeout);
  lastStepId = null;
  await writeState({ running: false });
  setIdleUI();
  document.getElementById('btnStart').textContent = '▶ התחל יום תחנות';
  document.getElementById('btnStart').disabled = false;
}

// --- Init + Realtime ---
async function init() {
  // Read initial state
  const state = await readState();
  if (state) applyState(state);

  // Subscribe to real-time changes
  sb.channel('timer_state')
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'timer_state'
    }, payload => {
      const newState = payload.new?.state;
      if (newState) applyState(newState);
    })
    .subscribe(status => {
      const el = document.getElementById('connStatus');
      if (status === 'SUBSCRIBED') {
        el.textContent = '● מחובר בזמן אמת';
        el.className = 'conn-status connected';
      } else {
        el.textContent = 'מתחבר...';
        el.className = 'conn-status';
      }
    });
}

init();
</script>
</body>
</html>
