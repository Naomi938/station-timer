<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יום תחנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #00e5a0; --accent-dim: #00e5a022;
    --warn: #ffb700; --danger: #ff4466;
    --text: #e8e8f0; --muted: #555570; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events: none;
  }
  .sound-gate {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; flex-direction: column; gap: 20px;
  }
  .sound-gate h2 { font-size: 22px; font-weight: 700; }
  .sound-gate p  { font-size: 14px; color: var(--muted); text-align: center; max-width: 300px; line-height: 1.6; }
  .btn-sound {
    background: var(--accent); color: #0a0a0f; border: none;
    border-radius: 10px; padding: 14px 36px;
    font-family: 'Heebo', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 32px;
    width: 100%; max-width: 540px; position: relative; z-index: 1;
  }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .title { font-size: 18px; font-weight: 700; }
  .round-badge {
    background: var(--accent-dim); border: 1px solid var(--accent);
    color: var(--accent); font-size: 13px; font-weight: 700;
    padding: 5px 14px; border-radius: 20px;
  }
  .phase-label { text-align: center; font-size: 22px; font-weight: 700; min-height: 56px; line-height: 1.4; margin-bottom: 20px; }
  .timer-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(72px, 20vw, 108px); line-height: 1;
    text-align: center; color: var(--accent); transition: color 0.3s;
    letter-spacing: -3px; margin-bottom: 16px;
  }
  .timer-display.warn   { color: var(--warn); }
  .timer-display.danger { color: var(--danger); }
  .timer-display.idle   { color: var(--muted); }
  .progress-track { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s linear, background 0.3s; width: 0%; }
  .progress-fill.warn   { background: var(--warn); }
  .progress-fill.danger { background: var(--danger); }
  .steps-wrap { margin-bottom: 24px; }
  .steps-title { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .steps-list { display: flex; flex-direction: column; gap: 4px; }
  .step-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; font-size: 13px; color: var(--muted); }
  .step-item.done     { color: var(--muted); text-decoration: line-through; }
  .step-item.active   { background: var(--accent-dim); color: var(--accent); font-weight: 700; }
  .step-item.upcoming { color: var(--text); }
  .step-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .btn-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .btn { flex: 1; padding: 13px; border-radius: 8px; border: none; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-start { background: var(--accent); color: #0a0a0f; }
  .btn-start:hover { filter: brightness(1.15); }
  .btn-reset { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-reset:hover { border-color: var(--danger); color: var(--danger); }
  .btn-wake { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-size: 13px; padding: 8px; }
  .btn-wake.active { background: var(--accent-dim); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .mode-toggle { display: flex; gap: 8px; margin-bottom: 24px; }
  .mode-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .admin-section { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .jump-section { margin-top: 16px; }
  .jump-title { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .jump-list { display: flex; flex-direction: column; gap: 4px; max-height: 220px; overflow-y: auto; }
  .jump-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-radius: 6px; font-size: 13px;
    border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
    background: transparent; color: var(--text); font-family: 'Heebo', sans-serif;
    text-align: right;
  }
  .jump-item:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .jump-item .jump-time { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  .overlay.show { opacity: 1; }
  .overlay-text { font-size: clamp(28px, 6vw, 52px); font-weight: 900; color: var(--accent); text-align: center; padding: 32px; max-width: 600px; line-height: 1.4; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .status-dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .conn-status { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 16px; }
  .conn-status.connected { color: var(--accent); }
  .wake-row { display: flex; justify-content: flex-end; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="sound-gate" id="soundGate">
  <h2>יום תחנות 🏥</h2>
  <p>לחצי להפעלת הקול</p>
  <button class="btn-sound" onclick="unlockAudio()">▶ כניסה</button>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-text" id="overlayText"></div>
</div>

<div class="card">
  <div class="header">
    <span class="title">יום תחנות</span>
    <div style="display:flex;gap:10px;align-items:center;">
      <span class="round-badge" id="roundBadge" style="display:none"></span>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btnViewer" onclick="setMode('viewer')">צפייה</button>
    <button class="mode-btn" id="btnAdmin" onclick="setMode('admin')">ניהול</button>
  </div>

  <!-- כפתור נעילת מסך — לכולם -->
  <div class="wake-row">
    <button class="btn btn-wake" id="btnWake" onclick="toggleWakeLock()">☀ מנע כיבוי מסך</button>
  </div>

  <div class="conn-status" id="connStatus">מתחבר...</div>
  <div class="phase-label" id="phaseLabel">ממתין להתחלה</div>
  <div class="timer-display idle" id="timerDisplay">--:--</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="steps-wrap" id="stepsWrap"></div>

  <div class="admin-section" id="adminSection" style="display:none">
    <div class="btn-row">
      <button class="btn btn-start" id="btnStart" onclick="adminStart()">▶ התחל יום תחנות</button>
      <button class="btn btn-reset" onclick="adminReset()">↺ איפוס</button>
    </div>

    <!-- דילוג לשלב -->
    <div class="jump-section">
      <div class="jump-title">דלג לשלב</div>
      <div class="jump-list" id="jumpList"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://kdmreoiusoowugsrbvzf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkbXJlb2l1c29vd3Vnc3JidnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDE3NDcsImV4cCI6MjA5NTg3Nzc0N30.F-B3Jb0l8Owq-LxMThJRthBTQG1W5Th9KDjRYjDhJ_c';
const ROW_ID = 1;
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ANNOUNCE_DUR = 4;

function buildSequence() {
  const seq = [];
  seq.push({ type: 'announce', text: 'תחילת יום תחנות', dur: ANNOUNCE_DUR });
  for (let r = 1; r <= 6; r++) {
    seq.push({ type: 'announce', text: 'קריאת הנחיות',   dur: ANNOUNCE_DUR, round: r });
    seq.push({ type: 'timer',    text: 'קריאת הנחיות',   dur: 150,          round: r });
    seq.push({ type: 'announce', text: 'כניסה לתחנה',    dur: ANNOUNCE_DUR, round: r });
    seq.push({ type: 'timer',    text: 'כניסה לתחנה',    dur: 300,          round: r });
    seq.push({ type: 'announce', text: 'עברו 5 דקות',    dur: ANNOUNCE_DUR, round: r });
    seq.push({ type: 'timer',    text: 'זמן נוסף בתחנה', dur: 300,          round: r });
    seq.push({ type: 'announce', text: r < 6 ? 'יציאה מהתחנה ומעבר לתחנה הבאה' : 'יציאה מהתחנה האחרונה', dur: ANNOUNCE_DUR, round: r });
  }
  seq.push({ type: 'announce', text: 'סוף יום תחנות', dur: ANNOUNCE_DUR });
  return seq;
}

const SEQUENCE = buildSequence();

// חשב offset מצטבר לכל שלב
const STEP_OFFSETS = [];
let acc = 0;
for (const s of SEQUENCE) { STEP_OFFSETS.push(acc); acc += s.dur; }
const TOTAL_DUR = acc;

function getStepAt(elapsed) {
  if (elapsed < 0) return null;
  if (elapsed >= TOTAL_DUR) return { done: true };
  let idx = 0;
  for (let i = SEQUENCE.length - 1; i >= 0; i--) {
    if (elapsed >= STEP_OFFSETS[i]) { idx = i; break; }
  }
  const step        = SEQUENCE[idx];
  const stepElapsed = elapsed - STEP_OFFSETS[idx];
  const remaining   = Math.max(0, Math.round(step.dur - stepElapsed));
  return { idx, step, remaining, done: false };
}

// --- State ---
let audioUnlocked  = false;
let availableVoice = null;
let mode           = 'viewer';
let tickInterval   = null;
let startTime      = null;
let lastSpokenIdx  = -1;
let wakeLock       = null;

// --- Wake Lock ---
async function toggleWakeLock() {
  const btn = document.getElementById('btnWake');
  if (wakeLock) {
    await wakeLock.release();
    wakeLock = null;
    btn.textContent = '☀ מנע כיבוי מסך';
    btn.classList.remove('active');
  } else {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      btn.textContent = '☀ מסך נעול';
      btn.classList.add('active');
      wakeLock.addEventListener('release', () => {
        wakeLock = null;
        btn.textContent = '☀ מנע כיבוי מסך';
        btn.classList.remove('active');
      });
    } catch(e) {
      btn.textContent = '☀ לא נתמך בדפדפן זה';
    }
  }
}

// --- Audio ---
function pickVoice() {
  const voices = window.speechSynthesis.getVoices();
  availableVoice =
    voices.find(v => v.lang.startsWith('he')) ||
    voices.find(v => v.lang.startsWith('en')) ||
    voices[0] || null;
}
function unlockAudio() {
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0;
  window.speechSynthesis.speak(u);
  pickVoice();
  audioUnlocked = true;
  document.getElementById('soundGate').style.display = 'none';
}
function speak(text) {
  if (!audioUnlocked || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (availableVoice) u.voice = availableVoice;
  u.lang = availableVoice?.lang || 'he-IL';
  u.rate = 0.9; u.volume = 1;
  window.speechSynthesis.speak(u);
}

// --- Helpers ---
function fmt(sec) {
  if (sec < 0) sec = 0;
  return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
}
function showOverlay(text) {
  const el = document.getElementById('overlay');
  document.getElementById('overlayText').textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), (ANNOUNCE_DUR - 0.5) * 1000);
}
function setMode(m) {
  mode = m;
  document.getElementById('btnViewer').classList.toggle('active', m==='viewer');
  document.getElementById('btnAdmin').classList.toggle('active', m==='admin');
  document.getElementById('adminSection').style.display = m==='admin' ? 'block' : 'none';
}
function renderSteps(idx) {
  const start = Math.max(0, idx - 1);
  const end   = Math.min(SEQUENCE.length - 1, idx + 4);
  let html = '<div class="steps-title">התקדמות</div><div class="steps-list">';
  for (let i = start; i <= end; i++) {
    const s   = SEQUENCE[i];
    const cls = i < idx ? 'done' : i === idx ? 'active' : 'upcoming';
    const dur = s.type === 'timer' ? ` (${fmt(s.dur)})` : '';
    html += `<div class="step-item ${cls}"><div class="step-dot"></div>${s.text}${dur}</div>`;
  }
  html += '</div>';
  document.getElementById('stepsWrap').innerHTML = html;
}
function setIdleUI() {
  clearInterval(tickInterval);
  document.getElementById('phaseLabel').textContent   = 'ממתין להתחלה';
  document.getElementById('timerDisplay').textContent = '--:--';
  document.getElementById('timerDisplay').className   = 'timer-display idle';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('statusDot').className      = 'status-dot';
  document.getElementById('roundBadge').style.display = 'none';
  document.getElementById('stepsWrap').innerHTML      = '';
  document.getElementById('btnStart').textContent     = '▶ התחל יום תחנות';
  document.getElementById('btnStart').disabled        = false;
  startTime = null;
  lastSpokenIdx = -1;
}

// --- Jump list (בפאנל ניהול) ---
function buildJumpList() {
  const list = document.getElementById('jumpList');
  let html = '';
  for (let i = 0; i < SEQUENCE.length; i++) {
    const s      = SEQUENCE[i];
    const label  = s.round ? `סבב ${s.round} — ${s.text}` : s.text;
    const offset = STEP_OFFSETS[i];
    const icon   = s.type === 'timer' ? '⏱' : '📢';
    html += `<button class="jump-item" onclick="jumpToStep(${i})">
      <span>${icon} ${label}</span>
      <span class="jump-time">${fmt(offset)}</span>
    </button>`;
  }
  list.innerHTML = html;
}

async function jumpToStep(idx) {
  // מחשב start_time כך שעכשיו יהיה בדיוק בתחילת השלב הזה
  const offset    = STEP_OFFSETS[idx];
  const newStart  = Date.now()/1000 - offset;
  const state     = { running: true, start_time: newStart };
  await writeState(state);
  startTime     = newStart;
  lastSpokenIdx = -1;
  if (!tickInterval) startTick();
  document.getElementById('btnStart').textContent = '⏳ רץ...';
  document.getElementById('btnStart').disabled    = true;
}

// --- Tick ---
function startTick() {
  clearInterval(tickInterval);
  tickInterval = setInterval(() => {
    if (!startTime) return;
    const elapsed = Date.now()/1000 - startTime;
    const info    = getStepAt(elapsed);

    if (!info || info.done) { setIdleUI(); return; }

    const { idx, step, remaining } = info;

    // Badge
    const b = document.getElementById('roundBadge');
    if (step.round) { b.textContent = `סבב ${step.round} / 6`; b.style.display = ''; }
    else b.style.display = 'none';

    // קול — רק פעם אחת לכל שלב
    if (idx !== lastSpokenIdx) {
      lastSpokenIdx = idx;
      if (step.type === 'announce') { speak(step.text); showOverlay(step.text); }
    }

    // UI
    document.getElementById('phaseLabel').textContent = step.text;
    document.getElementById('statusDot').className    = 'status-dot live';
    renderSteps(idx);

    if (step.type === 'announce') {
      document.getElementById('timerDisplay').textContent = '--:--';
      document.getElementById('timerDisplay').className   = 'timer-display idle';
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('progressFill').className   = 'progress-fill';
    } else {
      document.getElementById('timerDisplay').textContent = fmt(remaining);
      const pct = (remaining / step.dur) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      const c = remaining <= 30 ? 'danger' : remaining <= step.dur * 0.25 ? 'warn' : '';
      document.getElementById('timerDisplay').className   = 'timer-display ' + c;
      document.getElementById('progressFill').className   = 'progress-fill ' + c;
    }
  }, 200);
}

// --- Supabase ---
async function readState() {
  const { data } = await sb.from('timer_state').select('state').eq('id', ROW_ID).single();
  return data?.state || null;
}
async function writeState(state) {
  await sb.from('timer_state').update({ state }).eq('id', ROW_ID);
}

// --- Admin ---
async function adminStart() {
  const state = { running: true, start_time: Date.now()/1000 };
  await writeState(state);
  startTime = state.start_time;
  lastSpokenIdx = -1;
  startTick();
  document.getElementById('btnStart').textContent = '⏳ רץ...';
  document.getElementById('btnStart').disabled    = true;
}
async function adminReset() {
  await writeState({ running: false });
  setIdleUI();
}

// --- Init ---
async function init() {
  if (window.speechSynthesis.onvoiceschanged !== undefined)
    window.speechSynthesis.onvoiceschanged = pickVoice;
  pickVoice();
  buildJumpList();

  const s = await readState();
  document.getElementById('connStatus').textContent = '● מחובר';
  document.getElementById('connStatus').className   = 'conn-status connected';

  if (s?.running && s.start_time) {
    startTime = s.start_time;
    startTick();
    document.getElementById('btnStart').textContent = '⏳ רץ...';
    document.getElementById('btnStart').disabled    = true;
  }

  // Polling כל שנייה — זיהוי התחלה/דילוג/איפוס
  setInterval(async () => {
    const s = await readState();
    if (!s) return;
    if (s.running && s.start_time) {
      if (!startTime || Math.abs(s.start_time - startTime) > 1) {
        // התחלה חדשה או דילוג
        startTime     = s.start_time;
        lastSpokenIdx = -1;
        startTick();
        document.getElementById('btnStart').textContent = '⏳ רץ...';
        document.getElementById('btnStart').disabled    = true;
      }
    } else if (!s.running && startTime) {
      setIdleUI();
    }
  }, 1000);
}

init();
</script>
</body>
</html>
